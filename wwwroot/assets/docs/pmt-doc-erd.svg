<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">PMT ERD and database schema diagram</title>
  <desc id="desc">Screenshot-style entity relationship diagram with tables, fields, relationship lines, and compact routing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5fbf7"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f2a44" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="52" width="820" height="316" rx="24" fill="#fff"/>
    <rect x="70" y="52" width="820" height="52" rx="24" fill="#20324d"/>
    <path d="M70 84h820v20H70z" fill="#20324d"/>
    <text x="100" y="85" font-size="18" font-weight="700" fill="#fff">PMT ERD: compact database schema view</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" stroke-linecap="round" stroke-linejoin="round">
    <g filter="url(#shadow)">
      <rect x="130" y="148" width="150" height="130" rx="8" fill="#fff" stroke="#294a72" stroke-width="2"/>
      <rect x="130" y="148" width="150" height="28" rx="8" fill="#eef4ff" stroke="#294a72" stroke-width="2"/>
      <path d="M130 169h150" stroke="#294a72" stroke-width="2"/>
      <text x="164" y="167" font-size="13" font-weight="700" fill="#172033">pmt.Users</text>
      <text x="146" y="196" font-size="11" fill="#294a72">PK  UserId</text>
      <text x="146" y="216" font-size="11" fill="#52627a">FirstName</text>
      <text x="146" y="236" font-size="11" fill="#52627a">Email</text>
      <text x="146" y="256" font-size="11" fill="#52627a">IsActive</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="390" y="118" width="162" height="156" rx="8" fill="#fff" stroke="#294a72" stroke-width="2"/>
      <rect x="390" y="118" width="162" height="28" rx="8" fill="#eef4ff" stroke="#294a72" stroke-width="2"/>
      <path d="M390 139h162" stroke="#294a72" stroke-width="2"/>
      <text x="424" y="137" font-size="13" font-weight="700" fill="#172033">pmt.Projects</text>
      <text x="406" y="166" font-size="11" fill="#294a72">PK  ProjectId</text>
      <text x="406" y="186" font-size="11" fill="#52627a">Code</text>
      <text x="406" y="206" font-size="11" fill="#52627a">Title</text>
      <text x="406" y="226" font-size="11" fill="#52627a">FK  CreatedByUserId</text>
      <text x="406" y="246" font-size="11" fill="#52627a">FK  UpdatedByUserId</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="676" y="152" width="154" height="130" rx="8" fill="#fff" stroke="#294a72" stroke-width="2"/>
      <rect x="676" y="152" width="154" height="28" rx="8" fill="#eef4ff" stroke="#294a72" stroke-width="2"/>
      <path d="M676 173h154" stroke="#294a72" stroke-width="2"/>
      <text x="713" y="171" font-size="13" font-weight="700" fill="#172033">pmt.Sprints</text>
      <text x="692" y="200" font-size="11" fill="#294a72">PK  SprintId</text>
      <text x="692" y="220" font-size="11" fill="#52627a">FK  ProjectId</text>
      <text x="692" y="240" font-size="11" fill="#52627a">Code</text>
      <text x="692" y="260" font-size="11" fill="#52627a">Title</text>
    </g>
    <path d="M280 226h64v20h46" fill="none" stroke="#4f7cac" stroke-width="4"/>
    <path d="M552 166h74v54h50" fill="none" stroke="#4f7cac" stroke-width="4"/>
    <path d="M552 246h62v-20h62" fill="none" stroke="#ed7d31" stroke-width="4"/>
    <circle cx="344" cy="226" r="5" fill="#4f7cac" stroke="none"/>
    <path d="M662 214l14 6-14 6" fill="none" stroke="#4f7cac" stroke-width="4"/>
    <path d="M662 220h-10" stroke="#4f7cac" stroke-width="4"/>
    <text x="352" y="328" font-size="13" font-weight="700" fill="#294a72">PK/FK flags, field-level mapping, manual relationship routing, and compact auto-format are saved with the Diagram.</text>
  </g>
