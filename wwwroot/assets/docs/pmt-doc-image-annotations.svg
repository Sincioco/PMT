<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">PMT image annotations</title>
  <desc id="desc">Screenshot-style image annotation editor with an image, callout, arrow, crop handles, and reusable template controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f2a44" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="68" y="48" width="824" height="320" rx="24" fill="#fff"/>
    <rect x="68" y="48" width="824" height="54" rx="24" fill="#20324d"/>
    <path d="M68 82h824v20H68z" fill="#20324d"/>
    <text x="98" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Image Annotation Editor</text>
    <rect x="688" y="62" width="78" height="24" rx="12" fill="#eef4ff"/>
    <text x="708" y="79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#294a72">Template</text>
    <rect x="778" y="62" width="86" height="24" rx="12" fill="#ed7d31"/>
    <text x="804" y="79" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">Save</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="102" y="126" width="160" height="210" rx="16" fill="#f8fafc" stroke="#d9e2ef"/>
    <text x="126" y="154" font-size="14" font-weight="700" fill="#172033">Tools</text>
    <text x="126" y="188" font-size="12" fill="#52627a">Arrow</text>
    <text x="126" y="216" font-size="12" fill="#52627a">Highlight</text>
    <text x="126" y="244" font-size="12" fill="#52627a">Text box</text>
    <text x="126" y="272" font-size="12" fill="#52627a">Crop</text>
    <text x="126" y="300" font-size="12" fill="#52627a">Template</text>
    <rect x="294" y="126" width="538" height="210" rx="16" fill="#ffffff" stroke="#d9e2ef"/>
    <rect x="334" y="158" width="238" height="144" rx="14" fill="#dbeafe"/>
    <circle cx="392" cy="204" r="24" fill="#fbbf24"/>
    <path d="M350 285l72-58 44 36 42-30 48 52" fill="none" stroke="#4f7cac" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="318" y="144" width="272" height="174" rx="6" fill="none" stroke="#ed7d31" stroke-width="4" stroke-dasharray="10 8"/>
    <rect x="314" y="140" width="12" height="12" fill="#fff" stroke="#ed7d31" stroke-width="3"/>
    <rect x="584" y="312" width="12" height="12" fill="#fff" stroke="#ed7d31" stroke-width="3"/>
    <path d="M610 192c52-24 96-16 132 24" fill="none" stroke="#4ea72e" stroke-width="10" stroke-linecap="round"/>
    <path d="M742 216l-28-2 16-24" fill="none" stroke="#4ea72e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="650" y="238" width="142" height="58" rx="14" fill="#4ea72e"/>
    <text x="672" y="263" font-size="14" font-weight="700" fill="#fff">Callout</text>
    <text x="672" y="283" font-size="12" fill="#eefbea">Explain the image</text>
  </g>
</svg>
