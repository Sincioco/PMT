<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">PMT mentions and live cards</title>
  <desc id="desc">Screenshot-style PMT rich text editor showing mentions that open shared cards and live embedded work cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4f7fb"/>
      <stop offset="1" stop-color="#e8f1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1f2a44" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="840" cy="82" r="58" fill="#4f7cac" opacity=".13"/>
  <circle cx="116" cy="330" r="76" fill="#ed7d31" opacity=".12"/>
  <g filter="url(#shadow)">
    <rect x="70" y="54" width="820" height="310" rx="22" fill="#fff"/>
    <rect x="70" y="54" width="820" height="58" rx="22" fill="#20324d"/>
    <path d="M70 92h820v20H70z" fill="#20324d"/>
    <circle cx="104" cy="84" r="7" fill="#ffbf69"/>
    <circle cx="130" cy="84" r="7" fill="#8bd3c7"/>
    <circle cx="156" cy="84" r="7" fill="#b8c0ff"/>
    <text x="188" y="91" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Scrum update with PMT live references</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="104" y="142" width="444" height="184" rx="16" fill="#f8fafc" stroke="#d9e2ef"/>
    <text x="128" y="175" font-size="17" font-weight="700" fill="#172033">What changed today?</text>
    <text x="128" y="211" font-size="15" fill="#2f3b52">Review the blocking bug with </text>
    <rect x="333" y="193" width="82" height="26" rx="13" fill="#eaf3ff" stroke="#4f7cac"/>
    <text x="346" y="212" font-size="14" font-weight="700" fill="#294a72">@bug/17</text>
    <text x="423" y="211" font-size="15" fill="#2f3b52"> and confirm</text>
    <text x="128" y="239" font-size="15" fill="#2f3b52">the design notes in </text>
    <rect x="268" y="221" width="84" height="26" rx="13" fill="#fff4e8" stroke="#ed7d31"/>
    <text x="282" y="240" font-size="14" font-weight="700" fill="#9a4d18">@doc/42</text>
    <text x="360" y="239" font-size="15" fill="#2f3b52"> before QA signoff.</text>
    <rect x="128" y="270" width="196" height="34" rx="17" fill="#294a72"/>
    <text x="148" y="293" font-size="14" font-weight="700" fill="#fff">@livetask/24 inserted</text>
  </g>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="595" y="134" width="232" height="112" rx="16" fill="#fff" stroke="#d9e2ef"/>
    <rect x="595" y="134" width="232" height="34" rx="16" fill="#f4f7fb"/>
    <path d="M595 154h232v14H595z" fill="#f4f7fb"/>
    <text x="615" y="157" font-size="13" font-weight="700" fill="#294a72">Bug Report Card</text>
    <text x="615" y="190" font-size="17" font-weight="700" fill="#172033">PMT-BUG-017</text>
    <text x="615" y="214" font-size="13" fill="#52627a">Status: QA Failed</text>
    <rect x="724" y="194" width="78" height="24" rx="12" fill="#ffe9e6"/>
    <text x="739" y="211" font-size="12" font-weight="700" fill="#b23525">High</text>
  </g>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="592" y="264" width="246" height="74" rx="16" fill="#fff" stroke="#d9e2ef"/>
    <rect x="612" y="283" width="46" height="36" rx="10" fill="#eaf3ff"/>
    <text x="676" y="292" font-size="13" font-weight="700" fill="#294a72">Live Dev Task</text>
    <text x="676" y="316" font-size="16" font-weight="700" fill="#172033">Design shared mention cards</text>
    <rect x="760" y="282" width="54" height="22" rx="11" fill="#e7f6ed"/>
    <text x="774" y="298" font-size="11" font-weight="700" fill="#2f7d4a">75%</text>
  </g>
  <path d="M414 206c62-34 122-45 181-33" fill="none" stroke="#4f7cac" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
  <path d="M324 286c92 38 182 43 270 17" fill="none" stroke="#ed7d31" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
</svg>
