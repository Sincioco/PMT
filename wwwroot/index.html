    })();

<body>
  <header class="topbar">
    <div class="brand">
      <button type="button" class="brand-logo-button" data-brand-about aria-label="Open About page" title="About PMT">
        <img src="assets/project-pmt.svg?v=20260621-transparent" alt="">
      </button>
      <button type="button" class="brand-text-button" data-brand-about aria-label="Open About page" title="About PMT">
        <strong>PMT</strong>
        <span>Project Management Tool</span>
      </button>
    </div>
    <nav id="nav" class="nav" aria-label="Primary"></nav>
    <div class="user-actions">
      <div class="current-user user-menu">
        <button type="button" id="userMenuToggle" class="user-menu-toggle" aria-label="User menu" aria-expanded="false" aria-haspopup="menu">
          <img id="currentUserAvatar" src="assets/avatar-default.svg" alt="">
        </button>
        <select id="currentUser" disabled hidden></select>
        <div id="userMenu" class="user-menu-dropdown dropdown-menu" role="menu" hidden>
          <button class="dropdown-menu-item" type="button" data-action="change-password" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#128273;</span>
            <span class="dropdown-menu-label">Change Password</span>
          </button>
          <button class="dropdown-menu-item" type="button" data-action="invite-users" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#9993;</span>
            <span class="dropdown-menu-label">Invite Users</span>
          </button>
          <button class="dropdown-menu-item" type="button" data-action="suggestion" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#9998;</span>
            <span class="dropdown-menu-label">Suggestion</span>
          </button>
          <button class="dropdown-menu-item" type="button" data-action="whats-new" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#128240;</span>
            <span class="dropdown-menu-label">What's New</span>
          </button>
          <button class="dropdown-menu-item" type="button" id="logout" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#10162;</span>
            <span class="dropdown-menu-label">Log Out</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div id="impersonationBanner" class="impersonation-banner" role="status" aria-live="polite" hidden>
    <strong id="impersonationMessage"></strong>
    <button id="exitImpersonation" class="impersonation-exit-button" type="button">Exit Impersonation</button>
  </div>

  <div id="systemWarning" class="system-warning" role="alert" aria-live="polite" hidden></div>

  <main id="app" class="app-shell"></main>

  <dialog id="editorDialog" class="dialog editor-dialog">
    <form id="editorForm" method="dialog">
      <div class="dialog-head">
        <h2 id="dialogTitle"></h2>
        <div class="dialog-head-actions">
          <button type="button" class="secondary text-icon-button dialog-rich-tools-toggle-button" id="toggleAllRichTools" title="Hide Rich Text Toolbars" aria-label="Hide Rich Text Toolbars" aria-pressed="true" hidden>
            <span class="button-icon dialog-rich-tools-check" aria-hidden="true">&#9745;</span>
            <span>Toolbars</span>
          </button>
          <button type="button" class="icon-btn dialog-maximize-button" id="maximizeDialog" title="Maximize" aria-label="Maximize">Maximize</button>
          <button type="button" class="icon-btn" id="closeDialog" title="Close" aria-label="Close">x</button>
        </div>
      </div>
      <div id="dialogBody" class="dialog-body"></div>
      <div class="dialog-actions">
        <div class="dialog-secondary-actions" id="editorDialogSecondaryActions"></div>
        <button type="button" class="secondary text-icon-button" id="cancelDialog">
          <span class="button-icon" aria-hidden="true">&#10005;</span>
          <span>Cancel</span>
        </button>
        <button type="submit" class="primary text-icon-button">
          <span class="button-icon" aria-hidden="true">&#10003;</span>
          <span>Save</span>
        </button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>
  <script type="module" src="js/app.js?v=20260725-day36-v13"></script>
