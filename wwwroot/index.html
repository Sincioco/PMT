<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PMT</title>
  <script type="module" blocking="render">
    import { preferenceKeys, readPreference } from "/js/core/preferences.js";
    document.documentElement.dataset.theme = readPreference(preferenceKeys.theme, "dark");
  </script>
  <!-- CSS loads from broad foundations to shared components, then feature-specific rules. -->
  <link rel="stylesheet" href="/css/tokens.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/themes.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/base.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/layout.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/buttons.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/cards-panels.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/forms.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/dialogs.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/tables-lists.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/filters.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/navigation.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/avatars.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/attachments.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/progress-status.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/charts.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/login.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/dashboard.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/roadmap.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/gantt.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/board.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/projects.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/sprints.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/tasks.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/bugs.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/scrum.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/documentation.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/backlog.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/features/settings.css?v=20260619-shell-components">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/assets/project-pmt.svg" alt="PMT">
      <div>
        <strong>PMT</strong>
        <span>Software Engineering</span>
      </div>
    </div>
    <nav id="nav" class="nav" aria-label="Primary"></nav>
    <div class="user-actions">
      <div class="current-user user-menu">
        <button type="button" id="userMenuToggle" class="user-menu-toggle" aria-label="User menu" aria-expanded="false" aria-haspopup="menu">
          <img id="currentUserAvatar" src="/assets/avatar-default.svg" alt="">
        </button>
        <select id="currentUser" disabled hidden></select>
        <div id="userMenu" class="user-menu-dropdown" role="menu" hidden>
          <button type="button" data-view="Settings" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#9881;</span>
            <span>Settings</span>
          </button>
          <button type="button" data-action="toggle-theme" id="themeToggle" role="menuitem">
            <span class="button-icon" aria-hidden="true" data-theme-icon>&#9728;</span>
            <span data-theme-label>Light Theme</span>
          </button>
          <button type="button" data-action="change-password" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#128273;</span>
            <span>Change Password</span>
          </button>
          <button type="button" id="logout" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#10162;</span>
            <span>Log Out</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main id="app" class="app-shell"></main>

  <dialog id="editorDialog" class="dialog">
    <form id="editorForm" method="dialog">
      <div class="dialog-head">
        <h2 id="dialogTitle"></h2>
        <button type="button" class="icon-btn" id="closeDialog" title="Close">x</button>
      </div>
      <div id="dialogBody" class="dialog-body"></div>
      <div class="dialog-actions">
        <button type="button" class="secondary text-icon-button" id="cancelDialog">
          <span class="button-icon" aria-hidden="true">&#10005;</span>
          <span>Cancel</span>
        </button>
        <button type="submit" class="primary text-icon-button">
          <span class="button-icon" aria-hidden="true">&#10003;</span>
          <span>Save</span>
        </button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>
  <script type="module" src="/js/app.js?v=20260619-shell-components"></script>
</body>
</html>
