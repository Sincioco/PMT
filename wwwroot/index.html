<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>PMT</title>
  <script>
    (() => {
      let theme = "light";
      try {
        if (localStorage.getItem("pmt-theme") === "dark") theme = "dark";
      } catch {
        // Local preferences are optional.
      }
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      document.querySelector('meta[name="color-scheme"]').content =
        theme === "light" ? "light dark" : "dark light";
    })();
  </script>
  <!-- CSS loads from broad foundations to shared components, then feature-specific rules. -->
  <link rel="stylesheet" href="/css/tokens.css?v=20260620-token-depth">
  <link rel="stylesheet" href="/css/themes.css?v=20260621-paper-links">

  <link rel="stylesheet" href="/css/components/navigation.css?v=20260621-clickable-brand">
  <link rel="stylesheet" href="/css/components/avatars.css?v=20260620-token-depth">
  <link rel="stylesheet" href="/css/components/attachments.css?v=20260619-shell-components">
  <link rel="stylesheet" href="/css/components/progress-status.css?v=20260621-icon-size-20">

</head>
<body>
  <header class="topbar">
    <div class="brand">
      <button type="button" class="brand-logo-button" data-brand-about aria-label="Open About page" title="About PMT">
        <img src="/assets/project-pmt.svg?v=20260621-transparent" alt="">
      </button>
      <button type="button" class="brand-text-button" data-brand-about aria-label="Open About page" title="About PMT">
        <strong>PMT</strong>
        <span>Project Management Tool</span>
      </button>
    </div>
    <nav id="nav" class="nav" aria-label="Primary"></nav>
    <div class="user-actions">
      <div class="current-user user-menu">
        <button type="button" id="userMenuToggle" class="user-menu-toggle" aria-label="User menu" aria-expanded="false" aria-haspopup="menu">
          <img id="currentUserAvatar" src="/assets/avatar-default.svg" alt="">
        </button>
        <select id="currentUser" disabled hidden></select>
        <div id="userMenu" class="user-menu-dropdown" role="menu" hidden>
          <button type="button" data-view="About" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#9432;</span>
            <span>About</span>
          </button>
          <button type="button" data-view="Settings" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#9881;</span>
            <span>Settings</span>
          </button>
          <button type="button" data-action="toggle-theme" id="themeToggle" role="menuitem">
            <span class="button-icon" aria-hidden="true" data-theme-icon>&#9728;</span>
            <span data-theme-label>Light Theme</span>
          </button>
          <button type="button" data-action="change-password" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#128273;</span>
            <span>Change Password</span>
          </button>
          <button type="button" id="logout" role="menuitem">
            <span class="button-icon" aria-hidden="true">&#10162;</span>
            <span>Log Out</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main id="app" class="app-shell"></main>

  <dialog id="editorDialog" class="dialog">
    <form id="editorForm" method="dialog">
      <div class="dialog-head">
        <h2 id="dialogTitle"></h2>
        <button type="button" class="icon-btn" id="closeDialog" title="Close">x</button>
      </div>
      <div id="dialogBody" class="dialog-body"></div>
      <div class="dialog-actions">
        <div class="dialog-secondary-actions" id="editorDialogSecondaryActions"></div>
        <button type="button" class="secondary text-icon-button" id="cancelDialog">
          <span class="button-icon" aria-hidden="true">&#10005;</span>
          <span>Cancel</span>
        </button>
        <button type="submit" class="primary text-icon-button">
          <span class="button-icon" aria-hidden="true">&#10003;</span>
          <span>Save</span>
        </button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>
  <script type="module" src="/js/app.js?v=20260701-scrum-person-first"></script>
</body>
</html>
