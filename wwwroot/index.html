<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PMT</title>
  <link rel="stylesheet" href="/styles.css?v=20260616-devtools1">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/assets/project-pmt.svg" alt="PMT">
      <div>
        <strong>PMT</strong>
        <span>Software Engineering</span>
      </div>
    </div>
    <nav id="nav" class="nav"></nav>
    <div class="user-actions">
      <div class="current-user user-menu">
        <button type="button" id="userMenuToggle" class="user-menu-toggle" aria-label="User menu" aria-expanded="false">
          <img id="currentUserAvatar" src="/assets/avatar-default.svg" alt="">
        </button>
        <select id="currentUser" disabled hidden></select>
        <div id="userMenu" class="user-menu-dropdown" hidden>
          <button type="button" data-view="Settings">
            <span class="button-icon" aria-hidden="true">&#9881;</span>
            <span>Settings</span>
          </button>
          <button type="button" data-action="change-password">
            <span class="button-icon" aria-hidden="true">&#128273;</span>
            <span>Change Password</span>
          </button>
          <button type="button" id="logout">
            <span class="button-icon" aria-hidden="true">&#10162;</span>
            <span>Log Out</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main id="app" class="app-shell"></main>

  <dialog id="editorDialog" class="dialog">
    <form id="editorForm" method="dialog">
      <div class="dialog-head">
        <h2 id="dialogTitle"></h2>
        <button type="button" class="icon-btn" id="closeDialog" title="Close">x</button>
      </div>
      <div id="dialogBody" class="dialog-body"></div>
      <div class="dialog-actions">
        <button type="button" class="secondary text-icon-button" id="cancelDialog">
          <span class="button-icon" aria-hidden="true">&#10005;</span>
          <span>Cancel</span>
        </button>
        <button type="submit" class="primary text-icon-button">
          <span class="button-icon" aria-hidden="true">&#10003;</span>
          <span>Save</span>
        </button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" hidden></div>
  <script src="/app.js?v=20260616-devtools1"></script>
</body>
</html>
